# Pix2Pix — satellite -> map (E2 deneyi)
experiment_name: pix2pix_sat2map

data:
  root: data/processed/maps_paired
  image_size: 256
  batch_size: 16
  num_workers: 4
  augment:
    h_flip: true
    rotate90: true
    color_jitter_target_only: false

model:
  name: pix2pix
  in_channels: 3
  out_channels: 3
  gen_features: 64
  disc_features: 64
  norm: instance
  use_dropout: true

loss:
  gan: lsgan
  lambda_l1: 100.0
  lambda_perceptual: 0.0

optim:
  lr: 2.0e-4
  beta1: 0.5
  beta2: 0.999

train:
  epochs: 200
  lr_decay_start_epoch: 100
  save_every_epochs: 25
  log_every_steps: 100
  seed: 42

output:
  run_dir: ${oc.env:RUN_DIR, results/pix2pix_sat2map}
